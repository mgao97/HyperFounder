model:
  input_dim: 128
  hidden_dim: 128
  dropout: 0.3
  num_layers: 2
  num_heads: 4
  spectral_dim: 4

tasks:
  node_clusters: 4
  motif_clusters: 4
  community_clusters: 4
  prototype_clusters: 4

training:
  seed: 7
  device: cpu
  epochs: 1
  steps_per_epoch: 2
  lr: 0.001
  weight_decay: 0.0001
  motif_budget: 4
  feature_mask_rate: 0.15
  edge_dropout_rate: 0.2
  output_dir: outputs
  early_stopping:
    patience: 2
  minibatch:
    domains_per_step: 1
    subhypergraphs_per_domain: 1
    max_nodes: 128
    max_edges: 64
    expansion_hops: 2
    seed_edges_per_subhypergraph: 1
    use_subhypergraph_pool: false
    subhypergraph_pool_size: 4
    large_graph_node_threshold: 5000
  loss_weights:
    struct: 1.0
    node: 1.0
    edge: 1.0
    motif: 1.0
    community: 0.5
    global: 0.5
    cross: 1.0

data:
  datasets:
    - cora_cc
    - cooking_200
  domain_map:
    cora_cc: citation
    cooking_200: document
  cache_dir: data/cache

